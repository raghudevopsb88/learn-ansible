- name: Variable from Inventory
  hosts: TEST
  tasks:
    - name: Print URL
      ansible.builtin.debug:
        msg: URL - {{ URL }}, COMPONENT - {{ COMPONENT }}

- name: Variable from playbook
  hosts: TEST
  vars:
    PLAY1: example.com
  vars_files:
    - sample-vars.yml
  tasks:
    - name: Print URL
      ansible.builtin.debug:
        msg: PLAY1 - {{ PLAY1 }}, PLAY2 - {{ PLAY2 }}

- name: Variable from roles
  hosts: TEST
  roles:
    - sample

- name: Variable from tasks
  hosts: TEST
  tasks:
    - name: Print URL
      ansible.builtin.debug:
        msg: TASK1 - {{ TASK1 }}, TASK2 - {{ TASK2 }}
      vars:
        TASK1: coding
        TASK2: compiling

